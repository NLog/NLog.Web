version: 6.0.0.{build}
clone_folder: c:\projects\nlogweb
configuration: Release
image: Visual Studio 2026
platform: Any CPU

nuget:
  project_feed: true
matrix:
  fast_finish: true
environment:
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_NOLOGO: true

build:
  publish_nuget: true
  publish_nuget_symbols: true
  verbosity: quiet
  
skip_tags: true
skip_branch_with_pr: true

build_script:
  - ps: .\build.ps1

deploy:
- provider: NuGet
  api_key:
    secure: FStb6Kr5sjHdPq4EzjHeXkW4DQDlS92kM9ZWDhApT68+j4WN7J7cnvvk3fj/hMxi
  on:
    branch: master
    
test_script:
  - dotnet test

artifacts:
- path: '**\NLog.Web.*.nupkg'
- path: '**\NLog.Web.*.snupkg'
